const AC = new (window.AudioContext || window.webkitAudioContext)();
function sfxPlay(type) {
  if (!AC) return;
  if (AC.state === 'suspended') AC.resume();
  const t = AC.currentTime;
  switch(type) {
    case 'jump': {
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='square';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(440,t+0.08);
      g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.10);
      o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.10);break;
    }
    case 'land': {
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='square';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(200,t+0.12);
      g.gain.setValueAtTime(0.20,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
      o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.14);break;
    }
    case 'score10': {
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='triangle';o.frequency.setValueAtTime(880,t);
      g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.07);
      o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.07);break;
    }
    case 'death': {
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(60,t+0.5);
      g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
      o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.6);break;
    }
    case 'levelclear': {
      [523,659,784,1047].forEach((freq,i)=>{
        const o=AC.createOscillator(),g=AC.createGain();
        o.type='square';const s=t+i*0.10;
        o.frequency.setValueAtTime(freq,s);g.gain.setValueAtTime(0.15,s);g.gain.exponentialRampToValueAtTime(0.001,s+0.12);
        o.connect(g);g.connect(AC.destination);o.start(s);o.stop(s+0.12);
      });break;
    }
  }
}

const cv=document.getElementById('cv');
const gc=document.getElementById('gc');
const ctx=cv.getContext('2d');

const W=480,H=480;
const GROUND=Math.round(H*0.728);
const GRAVITY=0.70, JFORCE=-16.0, BASE_SPD=5;
const FONT='"Arcade", monospace';
const ANNIE_H=Math.round(H*0.155);
const ARM_H=Math.round(H*0.075);
const CART_H=Math.round(H*0.130);
const CACT_H=Math.round(H*0.185);
const HUD_FS=Math.round(H*0.058);

// Desert: 3 cactus shapes. Mines: same shapes but blue variants
const WORLDS = [
  { name:'4-20', night:false, obstacleType:'arm',
    cactusKeys:['cactus_g','cactus_b','cactus_t'],
    skyTop:'#E8714A', skyBot:'#F0906A',
    groundColor:'#D4B84A', sandKey:'sand', clouds:true },
  { name:'4-21', night:true, obstacleType:'cart',
    cactusKeys:['cactus_g_night','cactus_b_night','cactus_t_night'],
    skyTop:'#06061C', skyBot:'#0A0A28',
    groundColor:'#18203A', sandKey:'sand_night', clouds:false }
];

const CLOUD_DEFS=[
  {xFrac:0.18,yFrac:0.22,key:'cloud2'},
  {xFrac:0.55,yFrac:0.14,key:'cloud3'},
  {xFrac:0.80,yFrac:0.28,key:'cloud1'},
];

function sprW(key,targetH){const[,sw,sh]=SRC[key];return sw*(targetH/sh);}
function drawSprEx(key,feetX,feetY,targetH,flipV,flipH){
  const im=IMG[key];
  if(!im||!im.complete||!im.naturalWidth) return;
  const[,sw,sh]=SRC[key];
  const s=targetH/sh,dw=sw*s,dh=sh*s,dx=feetX-dw/2,dy=feetY-dh;
  ctx.save();
  if(flipV||flipH){
    ctx.translate(dx+dw/2,dy+dh/2);
    ctx.scale(flipH?-1:1,flipV?-1:1);
    ctx.drawImage(im,-dw/2,-dh/2,dw,dh);
  } else ctx.drawImage(im,dx,dy,dw,dh);
  ctx.restore();
}
function drawSpr(key,fx,fy,th){drawSprEx(key,fx,fy,th,false,false);}

let sunFlipFrame=0,sandOffset=0,cloudOffset=0,popups=[],frozen=null;
let S={screen:'title',worldIdx:0,score:0,hi:0,frame:0,speed:BASE_SPD,
       player:null,obs:[],cacti:[],parts:[],nObs:150,nCact:210};

function initP(){return{x:100,y:GROUND,vy:0,onGround:true,anim:0,aTick:0,dead:false,dTimer:0};}
function resetGame(){
  Object.assign(S,{score:0,frame:0,speed:BASE_SPD,worldIdx:0,
    obs:[],cacti:[],parts:[],nObs:150,nCact:210,player:initP()});
  sandOffset=0;cloudOffset=0;frozen=null;popups=[];sunFlipFrame=0;gc.className='day';
}
function getW(){return WORLDS[S.worldIdx];}

function act(){
  if(S.screen==='title'||S.screen==='dead'){resetGame();S.screen='playing';}
  else if(S.screen==='playing') jump();
  else if(S.screen==='worldclear') advWorld();
}
function jump(){
  const p=S.player;
  if(p&&p.onGround&&!p.dead){p.vy=JFORCE;p.onGround=false;sfxPlay('jump');}
}
function advWorld(){
  S.worldIdx=(S.worldIdx+1)%WORLDS.length;
  S.obs=[];S.cacti=[];S.nObs=200;S.nCact=210;
  S.screen='playing';gc.className=WORLDS[S.worldIdx].night?'night':'day';
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();act();}
  if(e.code==='Enter') act();
});
cv.addEventListener('click',act);

// Touch support
cv.addEventListener('touchstart',e=>{e.preventDefault();act();},{passive:false});

function annieBox(){
  const p=S.player,hw=sprW('annie_walk1',ANNIE_H)*0.22;
  return{x:p.x-hw,y:p.y-ANNIE_H*0.90,w:hw*2,h:ANNIE_H*0.90};
}
function obsBox(ob){
  const key=ob.type==='arm'?'arm1':'cart1';
  const h=ob.type==='arm'?ARM_H:CART_H;
  return{x:ob.x-sprW(key,h)/2,y:GROUND-h,w:sprW(key,h),h};
}
function cactBox(c){
  const w=sprW(c.key,CACT_H)*0.32;
  return{x:c.x-w/2,y:GROUND-CACT_H,w,h:CACT_H};
}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function landCheck(ob){
  const p=S.player,ab=annieBox(),ob2=obsBox(ob);
  return p.vy>0&&ab.x<ob2.x+ob2.w&&ab.x+ab.w>ob2.x&&p.y>=ob2.y-6&&p.y<=ob2.y+22;
}
function freezeNow(){
  frozen={obs:S.obs.map(o=>({...o})),cacti:S.cacti.map(c=>({...c})),
    sandOff:sandOffset,cloudOff:cloudOffset,worldIdx:S.worldIdx};
}

function update(){
  if(S.screen!=='playing') return;
  S.frame++;sunFlipFrame++;
  const p=S.player;
  if(p.dead){
    p.vy+=GRAVITY;p.y=Math.min(p.y+p.vy,GROUND);
    if(++p.dTimer>80){S.hi=Math.max(S.hi,Math.floor(S.score));S.screen='dead';}
    return;
  }
  sandOffset=(sandOffset+S.speed)%W;
  cloudOffset=(cloudOffset+S.speed)%(W*2);
  if(S.worldIdx===0&&S.frame===1800){
    S.hi=Math.max(S.hi,Math.floor(S.score));S.score+=1000;
    sfxPlay('levelclear');S.screen='worldclear';return;
  }
  p.vy+=GRAVITY;p.y+=p.vy;
  if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.onGround=true;}else p.onGround=false;
  if(++p.aTick>8){p.anim++;p.aTick=0;}
  if(--S.nObs<=0) spawnObs();
  if(--S.nCact<=0) spawnCact();
  for(const ob of S.obs){
    ob.x-=S.speed;
    if(ob.fTimer>0) ob.fTimer--;
    ob.animTick=(ob.animTick||0)+1;
    if(ob.animTick>12){ob.animTick=0;ob.animFrame=(ob.animFrame||0)^1;}
    if(ob.flipped) continue;
    if(landCheck(ob)){
      ob.flipped=true;ob.fTimer=80;p.vy=JFORCE*0.55;p.onGround=false;
      S.score+=100;sfxPlay('land');
      popups.push({x:p.x,y:p.y-ANNIE_H,val:100,color:'#FFD700',life:50,vy:-1.4});
      burst(ob.x,GROUND-30);
    } else if(overlap(annieBox(),obsBox(ob))){
      freezeNow();sfxPlay('death');p.dead=true;p.dTimer=0;
    }
  }
  for(const c of S.cacti){
    c.x-=S.speed;
    if(!c.passed&&p.x>c.x+sprW(c.key,CACT_H)*0.5){
      c.passed=true;
      if(!p.onGround){S.score+=10;sfxPlay('score10');
        popups.push({x:p.x,y:p.y-ANNIE_H,val:10,color:'#FFFFFF',life:50,vy:-1.4});}
    }
    if(overlap(annieBox(),cactBox(c))){freezeNow();sfxPlay('death');p.dead=true;p.dTimer=0;}
  }
  for(const pt of S.parts){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.12;pt.life--;}
  for(const pp of popups){pp.y+=pp.vy;pp.life--;}
  S.obs=S.obs.filter(o=>o.x>-120);
  S.cacti=S.cacti.filter(c=>c.x>-80);
  S.parts=S.parts.filter(p=>p.life>0);
  popups=popups.filter(p=>p.life>0);
}
function spawnObs(){
  S.obs.push({x:W+80,type:getW().obstacleType,flipped:false,fTimer:0,animFrame:0,animTick:0});
  S.nObs=230+Math.random()*250;
}
function spawnCact(){
  const w=getW(),keys=w.cactusKeys;
  const key=keys[Math.floor(Math.random()*keys.length)];
  S.cacti.push({x:W+60,passed:false,key});
  S.nCact=170+Math.random()*230;
}
function burst(x,y){
  const cols=['#FB3DF6','#6AFBF9','#F4D030','#FFFFFF'];
  for(let i=0;i<10;i++)
    S.parts.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*5-1,life:38,color:cols[i%4]});
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawBg(w){
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,w.skyTop);g.addColorStop(1,w.skyBot);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,GROUND);
}
function drawGround(w,sandOff){
  const gh=H-GROUND;
  ctx.fillStyle=w.groundColor;ctx.fillRect(0,GROUND,W,gh);
  // No ground line
  const sk=w.sandKey;
  if(IMG[sk]&&IMG[sk].complete&&IMG[sk].naturalWidth){
    const[,sw,sh]=SRC[sk],th=gh,tw=Math.round(th*sw/sh);
    ctx.globalAlpha=0.55;
    const off=sandOff%tw;
    for(let x=-off;x<W;x+=tw) ctx.drawImage(IMG[sk],x,GROUND,tw,th);
    ctx.globalAlpha=1;
  } else {
    ctx.fillStyle=w.night?'#22305A':'#BFA030';
    const step=20,off=sandOff%step;
    for(let y=GROUND+8;y<H;y+=14)
      for(let x=-off;x<W;x+=step) ctx.fillRect(x,y,4,4);
  }
}
function drawClouds(w,cloudOff){
  if(!w.clouds) return;
  CLOUD_DEFS.forEach(cl=>{
    const im=IMG[cl.key];
    if(!im||!im.complete||!im.naturalWidth) return;
    const[,cw,ch]=SRC[cl.key];
    const th=Math.round(W*0.135),tw=Math.round(th*cw/ch);
    const y=Math.round(cl.yFrac*GROUND);
    const baseX=cl.xFrac*W*2;
    const scrolled=((baseX-cloudOff)%(W*2)+W*2)%(W*2);
    for(const dx of [0,W*2]){
      const rx=scrolled+dx-tw/2;
      if(rx<W+tw&&rx+tw>-tw) ctx.drawImage(im,Math.round(rx),y,tw,th);
    }
  });
}
function drawSun(w){
  if(w.night) return;
  if(!IMG.sun||!IMG.sun.complete||!IMG.sun.naturalWidth) return;
  const[,sw,sh]=SRC.sun;
  const th=Math.round(H*0.155),tw=Math.round(sw*(th/sh));
  const doFlip=Math.floor(sunFlipFrame/90)%2===1;
  const x=Math.round(W/2-tw/2),y=4;
  ctx.save();
  if(doFlip){ctx.translate(x+tw/2,y+th/2);ctx.scale(-1,1);ctx.drawImage(IMG.sun,-tw/2,-th/2,tw,th);}
  else ctx.drawImage(IMG.sun,x,y,tw,th);
  ctx.restore();
}
function drawHUD(w){
  const col=w.night?'#CCCCFF':'#FFFFFF';
  ctx.font=HUD_FS+'px '+FONT;ctx.fillStyle=col;
  ctx.textAlign='left'; ctx.fillText('ANNIE',10,HUD_FS+6);
  ctx.textAlign='right'; ctx.fillText(String(Math.floor(S.score)).padStart(6,'0'),W-10,HUD_FS+6);
  ctx.textAlign='left';
}
function drawObstacles(obs,cacti,w){
  for(const ob of obs){
    if(ob.type==='arm'){
      const key=ob.flipped?'arm1':(ob.animFrame===0?'arm1':'arm2');
      drawSprEx(key,ob.x,GROUND,ARM_H,ob.flipped,false);
    } else {
      const key=ob.flipped?'cart1':(ob.animFrame===0?'cart1':'cart2');
      drawSprEx(key,ob.x,GROUND,CART_H,ob.flipped,false);
    }
  }
  for(const c of cacti) drawSpr(c.key,c.x,GROUND,CACT_H);
}
function drawPopups(){
  for(const pp of popups){
    ctx.globalAlpha=Math.min(1,pp.life/20);
    ctx.font='bold 18px '+FONT;ctx.fillStyle=pp.color;
    ctx.textAlign='center';ctx.fillText(String(pp.val),pp.x,pp.y);
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
}

function draw(){
  const w=getW();
  if(S.screen==='title'){
    drawBg(WORLDS[0]);drawClouds(WORLDS[0],cloudOffset);drawSun(WORLDS[0]);
    drawGround(WORLDS[0],sandOffset);
    drawSpr('cactus_g',255,GROUND,CACT_H);
    drawSpr('cactus_t',335,GROUND,CACT_H);
    drawSpr('cactus_b',385,GROUND,CACT_H);
    drawSpr('arm1',440,GROUND,ARM_H);
    drawSpr('annie_walk1',110,GROUND,ANNIE_H);
    ctx.fillStyle='rgba(0,0,0,0.40)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#FFF';ctx.font='14px '+FONT;
    ctx.fillText('AUNTIE ARIZONAS DESERT DASH',W/2,H/2-28);
    ctx.font='12px '+FONT;ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fillText('SPACE / TAP TO START',W/2,H/2+14);
    ctx.font='10px '+FONT;ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('HIGHEST SCORE EVER: DAVE HEATWAVE',W/2,H/2+40);
    ctx.textAlign='left';return;
  }

  const isDead=(S.screen==='dead')||(S.player&&S.player.dead);
  const rObs   =(isDead&&frozen)?frozen.obs   :S.obs;
  const rCacti =(isDead&&frozen)?frozen.cacti :S.cacti;
  const rSand  =(isDead&&frozen)?frozen.sandOff:sandOffset;
  const rCloud =(isDead&&frozen)?frozen.cloudOff:cloudOffset;
  const rWorld =(isDead&&frozen)?WORLDS[frozen.worldIdx]:w;

  drawBg(rWorld);drawClouds(rWorld,rCloud);drawSun(rWorld);
  drawGround(rWorld,rSand);drawObstacles(rObs,rCacti,rWorld);

  for(const pt of S.parts){
    ctx.globalAlpha=pt.life/38;
    ctx.fillStyle=pt.color;ctx.fillRect(pt.x-2,pt.y-2,4,4);
  }
  ctx.globalAlpha=1;

  if(S.player){
    const p=S.player;
    let key=p.dead?'annie_die':(!p.onGround?'annie_jump':(p.anim%2===0?'annie_walk1':'annie_walk2'));
    drawSpr(key,p.x,p.y,ANNIE_H);
  }
  drawPopups();drawHUD(rWorld);

  if(S.screen==='worldclear'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#F5C518';ctx.font='bold 24px '+FONT;
    ctx.fillText('WORLD '+WORLDS[0].name+' CLEAR!',W/2,H/2-18);
    ctx.fillStyle='#FFD700';ctx.font='bold 20px '+FONT;
    ctx.fillText('+1000',W/2,H/2+20);
    ctx.fillStyle='#FFF';ctx.font='11px '+FONT;
    ctx.fillText('SPACE / TAP  >>  ENTER THE MINES',W/2,H/2+56);
    ctx.textAlign='left';
  }

  if(S.screen==='dead'){
    const dw=WORLDS[frozen?frozen.worldIdx:S.worldIdx];
    drawBg(dw);drawGround(dw,frozen?frozen.sandOff:sandOffset);
    const gW=Math.round(W*0.30),gH=Math.round(gW*SRC.grave[2]/SRC.grave[1]);
    if(IMG.grave&&IMG.grave.complete&&IMG.grave.naturalWidth)
      ctx.drawImage(IMG.grave,W/2-gW/2,GROUND-gH,gW,gH);
    const goFS=Math.round(H*0.082),midSky=Math.round(GROUND*0.42);
    ctx.textAlign='center';ctx.fillStyle='#FFFFFF';ctx.font=goFS+'px '+FONT;
    ctx.fillText('GAME',W/2,midSky);ctx.fillText('OVER',W/2,midSky+goFS+8);
    ctx.font='12px '+FONT;ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fillText('INSERT COIN(S) TO CONTINUE',W/2,H/2+14);
    ctx.textAlign='left';
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();

</script></body>
