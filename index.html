// ── Audio Engine (Web Audio API) ─────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function sfxPlay(type) {
  if (!AC) return;
  // Resume context on first user gesture (browser autoplay policy)
  if (AC.state === 'suspended') AC.resume();

  const t = AC.currentTime;

  switch(type) {

    case 'jump': {
      // Rising square wave chirp: 220→440 Hz over 80ms
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.08);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.10);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(t); osc.stop(t + 0.10);
      break;
    }

    case 'land': {
      // Short descending blip: 400→200 Hz, 120ms — land on creature
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(500, t);
      osc.frequency.exponentialRampToValueAtTime(200, t + 0.12);
      gain.gain.setValueAtTime(0.20, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(t); osc.stop(t + 0.14);
      break;
    }

    case 'score10': {
      // Quick high blip: 880 Hz, 60ms — +10 cactus
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(880, t);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(t); osc.stop(t + 0.07);
      break;
    }

    case 'death': {
      // Descending noise buzz: starts 300Hz, falls to 60Hz over 600ms
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.5);
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.connect(gain); gain.connect(AC.destination);
      osc.start(t); osc.stop(t + 0.6);
      break;
    }

    case 'levelclear': {
      // 4-note ascending fanfare: C5 E5 G5 C6
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = AC.createOscillator();
        const gain = AC.createGain();
        osc.type = 'square';
        const start = t + i * 0.10;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.15, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.12);
        osc.connect(gain); gain.connect(AC.destination);
        osc.start(start); osc.stop(start + 0.12);
      });
      break;
    }
  }
}
// Resume audio context on first interaction
document.addEventListener('click',  () => AC.state==='suspended' && AC.resume(), {once:true});
document.addEventListener('keydown', () => AC.state==='suspended' && AC.resume(), {once:true});


const cv  = document.getElementById('cv');
const gc  = document.getElementById('gc');
const ctx = cv.getContext('2d');

const W = 480, H = 480;
const GROUND   = Math.round(H * 0.728); // 350
const GRAVITY  = 0.70;
const JFORCE   = -16.0;
const BASE_SPD = 5;
const FONT     = '"Arcade", monospace';

const ANNIE_H = Math.round(H * 0.155); // 74px
const ARM_H   = Math.round(H * 0.090); // 43px
const CART_H  = Math.round(H * 0.140); // 67px
const CACT_H  = Math.round(H * 0.185); // 89px
const HUD_FS  = Math.round(H * 0.058); // 28px

function sprW(key, targetH) {
  const [,sw,sh] = SRC[key];
  return sw * (targetH / sh);
}

// Draw sprite with feet at (feetX, feetY), scaled to targetH
// flipV = true: flip vertically (upside down, for landed-on state)
// flipH = true: flip horizontally (mirror sun animation)
function drawSprEx(key, feetX, feetY, targetH, flipV, flipH) {
  const im = IMG[key];
  if (!im || !im.complete) return;
  const [,sw,sh] = SRC[key];
  const s  = targetH / sh;
  const dw = sw * s, dh = sh * s;
  const dx = feetX - dw/2;
  const dy = feetY - dh;
  ctx.save();
  if (flipV || flipH) {
    ctx.translate(dx + dw/2, dy + dh/2);
    ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
    ctx.drawImage(im, -dw/2, -dh/2, dw, dh);
  } else {
    ctx.drawImage(im, dx, dy, dw, dh);
  }
  ctx.restore();
}
function drawSpr(key, feetX, feetY, targetH) {
  drawSprEx(key, feetX, feetY, targetH, false, false);
}

const WORLDS = [
  { name:'4-20', night:false, obstacleType:'arm', cactusKey:'cactus_g',
    skyTop:'#E8714A', skyBot:'#F0906A',
    groundColor:'#D4B84A', groundLine:'#9A8020', clouds:true },
  { name:'4-21', night:true, obstacleType:'cart', cactusKey:'cactus_b',
    skyTop:'#06061C', skyBot:'#0A0A28',
    groundColor:'#18203A', groundLine:'#2A3880', clouds:false }
];

// 3 fixed cloud positions — truly static, never move
const CLOUD_DEFS = [
  { xFrac:0.18, yFrac:0.22, key:'cloud2' },
  { xFrac:0.55, yFrac:0.14, key:'cloud3' },
  { xFrac:0.80, yFrac:0.28, key:'cloud1' },
];

// Sun animation: slow horizontal mirror flip every ~90 frames (~1.5s)
// Gives the "d and b dancing" oscillation from the original
let sunFlipFrame = 0; // counts up, flips every 90 frames

let sandOffset = 0;
let cloudOffset = 0;
let popups = [];

// Frozen snapshot — locked at exact death moment, never mutates
let frozen = null;

let S = {
  screen:'title', worldIdx:0, score:0, hi:0,
  frame:0, speed:BASE_SPD,
  player:null, obs:[], cacti:[], parts:[],
  nObs:150, nCact:210,
};

function initP() {
  return { x:100, y:GROUND, vy:0, onGround:true,
           anim:0, aTick:0, dead:false, dTimer:0 };
}
function resetGame() {
  Object.assign(S, {
    score:0, frame:0, speed:BASE_SPD, worldIdx:0,
    obs:[], cacti:[], parts:[],
    nObs:150, nCact:210, player:initP()
  });
  sandOffset = 0; cloudOffset = 0; frozen = null; popups = [];
  sunFlipFrame = 0;
  gc.className = 'day';
}
function getW() { return WORLDS[S.worldIdx]; }

function act() {
  if (S.screen==='title'||S.screen==='dead') { resetGame(); S.screen='playing'; }
  else if (S.screen==='playing') jump();
  else if (S.screen==='worldclear') advWorld();
}
function jump() {
  const p = S.player;
  if (p && p.onGround && !p.dead) { p.vy=JFORCE; p.onGround=false; sfxPlay('jump'); }
}
function advWorld() {
  S.worldIdx = (S.worldIdx+1) % WORLDS.length;
  S.obs=[]; S.cacti=[]; S.nObs=200; S.nCact=210;
  S.screen='playing';
  gc.className = WORLDS[S.worldIdx].night ? 'night' : 'day';
}
document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();act();}
  if(e.code==='Enter') act();
});
cv.addEventListener('click', act);

// Hitboxes
function annieBox() {
  const p=S.player, hw=sprW('walk1',ANNIE_H)*0.22;
  return { x:p.x-hw, y:p.y-ANNIE_H*0.90, w:hw*2, h:ANNIE_H*0.90 };
}
function obsBox(ob) {
  const key = ob.type==='arm' ? 'arm' : 'cart';
  const h   = ob.type==='arm' ? ARM_H : CART_H;
  const w   = sprW(key, h); // full width
  return { x:ob.x-w/2, y:GROUND-h, w, h };
}
function cactBox(c) {
  const w = sprW('cactus_g', CACT_H) * 0.32;
  return { x:c.x-w/2, y:GROUND-CACT_H, w, h:CACT_H };
}
function overlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}
function landCheck(ob) {
  const p=S.player, ab=annieBox(), ob2=obsBox(ob);
  return p.vy>0
    && ab.x<ob2.x+ob2.w && ab.x+ab.w>ob2.x
    && p.y>=ob2.y-6 && p.y<=ob2.y+22;
}

function freezeNow() {
  // Snapshot everything — world stops here
  frozen = {
    obs:      S.obs.map(o=>({...o})),
    cacti:    S.cacti.map(c=>({...c})),
    sandOff:  sandOffset,
    cloudOff: cloudOffset,
    worldIdx: S.worldIdx,
    // Annie's position at death
    annieX:   S.player.x,
    annieY:   S.player.y,
  };
}

function update() {
  if (S.screen !== 'playing') return;
  S.frame++;
  sunFlipFrame++;

  const p = S.player;

  if (p.dead) {
    // World is frozen — only annie falls, then we go to dead screen
    p.vy += GRAVITY; p.y = Math.min(p.y+p.vy, GROUND);
    if (++p.dTimer > 80) {
      S.hi = Math.max(S.hi, Math.floor(S.score));
      S.screen = 'dead';
    }
    return; // nothing else moves
  }

  // Sand scrolls
  sandOffset = (sandOffset + S.speed) % W;
  cloudOffset = (cloudOffset + S.speed) % (W * 2);

  // World clear
  if (S.worldIdx===0 && S.frame===1800) {
    S.hi = Math.max(S.hi, Math.floor(S.score));
    S.score += 1000;
    sfxPlay('levelclear');
    S.screen = 'worldclear';
    return;
  }

  p.vy += GRAVITY; p.y += p.vy;
  if(p.y>=GROUND){ p.y=GROUND; p.vy=0; p.onGround=true; } else p.onGround=false;
  if(++p.aTick>8){ p.anim++; p.aTick=0; }

  if(--S.nObs<=0) spawnObs();
  if(--S.nCact<=0) spawnCact();

  for(const ob of S.obs) {
    ob.x -= S.speed;
    if(ob.fTimer>0) ob.fTimer--;
    if(ob.flipped) continue;
    if(landCheck(ob)) {
      ob.flipped=true; ob.fTimer=80;
      p.vy=JFORCE*0.55; p.onGround=false;
      S.score+=100;
      sfxPlay('land');
      popups.push({x:p.x, y:p.y-ANNIE_H, val:100, color:'#FFD700', life:50, vy:-1.4});
      burst(ob.x, GROUND-30);
    } else if(overlap(annieBox(), obsBox(ob))) {
      // FREEZE immediately on collision
      freezeNow();
      p.dead=true; p.dTimer=0;
    }
  }

  for(const c of S.cacti) {
    c.x -= S.speed;
    if(!c.passed && p.x > c.x + sprW('cactus_g',CACT_H)*0.5) {
      c.passed=true;
      if(!p.onGround) {
        S.score+=10;
        sfxPlay('score10');
        popups.push({x:p.x, y:p.y-ANNIE_H, val:10, color:'#FFFFFF', life:50, vy:-1.4});
      }
    }
    if(overlap(annieBox(), cactBox(c))) {
      freezeNow();
      sfxPlay('death');
      p.dead=true; p.dTimer=0;
    }
  }

  for(const pt of S.parts){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.12; pt.life--; }
  for(const pp of popups) { pp.y+=pp.vy; pp.life--; }

  S.obs   = S.obs.filter(o=>o.x>-120);
  S.cacti = S.cacti.filter(c=>c.x>-80);
  S.parts = S.parts.filter(p=>p.life>0);
  popups  = popups.filter(p=>p.life>0);
}

function spawnObs(){
  S.obs.push({x:W+80, type:getW().obstacleType, flipped:false, fTimer:0});
  S.nObs=230+Math.random()*250;
}
function spawnCact(){
  S.cacti.push({x:W+60, passed:false});
  S.nCact=170+Math.random()*230;
}
function burst(x,y){
  const cols=['#FB3DF6','#6AFBF9','#F4D030','#FFFFFF'];
  for(let i=0;i<10;i++)
    S.parts.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*5-1,
      life:38, color:cols[i%4]});
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawBg(w) {
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,w.skyTop); g.addColorStop(1,w.skyBot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND);
}

function drawGround(w, sandOff) {
  const gh=H-GROUND;
  ctx.fillStyle=w.groundColor; ctx.fillRect(0,GROUND,W,gh);
  ctx.fillStyle=w.groundLine;  ctx.fillRect(0,GROUND,W,3);
  if(IMG.sand&&IMG.sand.complete&&!w.night){
    const [,sw,sh]=SRC.sand, th=gh-3, tw=Math.round(th*sw/sh);
    ctx.globalAlpha=0.42;
    const off=sandOff%tw;
    for(let x=-off;x<W;x+=tw) ctx.drawImage(IMG.sand,x,GROUND+3,tw,th);
    ctx.globalAlpha=1;
  } else {
    ctx.fillStyle='#22305A';
    const step=20, off=sandOff%step;
    for(let y=GROUND+8;y<H;y+=14)
      for(let x=-off;x<W;x+=step) ctx.fillRect(x,y,4,4);
  }
}

function drawClouds(w, cloudOff) {
  if(!w.clouds) return;
  // Each cloud has a fixed y and a base x-slot spread over 2W
  // They scroll left at game speed, wrapping every 2W
  CLOUD_DEFS.forEach(cl=>{
    const im=IMG[cl.key];
    if(!im||!im.complete) return;
    const [,cw,ch]=SRC[cl.key];
    const th=Math.round(W*0.135), tw=Math.round(th*cw/ch);
    const y=Math.round(cl.yFrac*GROUND);
    // Base position spread evenly: 0, 2W/3, 4W/3
    const baseX = cl.xFrac * W * 2;
    // Scroll left, wrap in 2W space
    const scrolled = ((baseX - cloudOff) % (W*2) + W*2) % (W*2);
    // Draw at scrolled position, and again 2W ahead for seamless wrap
    for (const dx of [0, W*2]) {
      const rx = scrolled + dx - tw/2;
      if (rx < W + tw && rx + tw > -tw)
        ctx.drawImage(im, Math.round(rx), y, tw, th);
    }
  });
}

function drawSun(w) {
  if(w.night) return;
  if(!IMG.sun||!IMG.sun.complete) return;
  const [,sw,sh]=SRC.sun;
  const th=Math.round(H*0.155), tw=Math.round(sw*(th/sh));
  // Horizontal flip every 90 frames = "d and b" dance
  const doFlip = Math.floor(sunFlipFrame/90) % 2 === 1;
  // Draw centered at top, fully inside canvas
  const x=Math.round(W/2-tw/2), y=4;
  ctx.save();
  if(doFlip){
    ctx.translate(x+tw/2, y+th/2);
    ctx.scale(-1,1);
    ctx.drawImage(IMG.sun,-tw/2,-th/2,tw,th);
  } else {
    ctx.drawImage(IMG.sun,x,y,tw,th);
  }
  ctx.restore();
}

function drawHUD(w) {
  const col=w.night?'#CCCCFF':'#FFFFFF';
  ctx.font=HUD_FS+'px '+FONT;
  ctx.fillStyle=col;
  ctx.textAlign='left';  ctx.fillText('ANNIE', 10, HUD_FS+6);
  ctx.textAlign='right'; ctx.fillText(String(Math.floor(S.score)).padStart(6,'0'), W-10, HUD_FS+6);
  ctx.textAlign='left';
}

function drawObstacles(obs, cacti, w) {
  for(const ob of obs){
    const key=ob.type==='arm'?'arm':'cart';
    const h=ob.type==='arm'?ARM_H:CART_H;
    // Flipped = upside down (flipV), same sprite
    drawSprEx(key, ob.x, GROUND, h, ob.flipped, false);
  }
  for(const c of cacti) drawSpr(w.cactusKey, c.x, GROUND, CACT_H);
}

function drawPopups() {
  for(const pp of popups){
    ctx.globalAlpha=Math.min(1,pp.life/20);
    ctx.font='bold 18px '+FONT;
    ctx.fillStyle=pp.color;
    ctx.textAlign='center';
    ctx.fillText(String(pp.val), pp.x, pp.y);
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw(){
  const w=getW();

  // TITLE
  if(S.screen==='title'){
    drawBg(WORLDS[0]); drawClouds(WORLDS[0], cloudOffset); drawSun(WORLDS[0]);
    drawGround(WORLDS[0], sandOffset);
    drawSpr('cactus_g',310,GROUND,CACT_H);
    drawSpr('arm',410,GROUND,ARM_H);
    drawSpr('walk1',120,GROUND,ANNIE_H);
    ctx.fillStyle='rgba(0,0,0,0.40)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#FFF'; ctx.font='bold 20px '+FONT;
    ctx.fillText('AUNTIE ARIZONAS DESERT DASH', W/2, H/2-28);
    ctx.font='12px '+FONT; ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fillText('SPACE / TAP TO START', W/2, H/2+14);
    ctx.font='10px '+FONT; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('HIGH SCORE: DAVE HEATWAVE', W/2, H/2+40);
    ctx.textAlign='left'; return;
  }

  // Determine what to render (frozen snapshot during/after death)
  const isDead = (S.screen==='dead') || (S.player && S.player.dead);
  const rObs    = (isDead && frozen) ? frozen.obs   : S.obs;
  const rCacti  = (isDead && frozen) ? frozen.cacti : S.cacti;
  const rSand   = (isDead && frozen) ? frozen.sandOff  : sandOffset;
  const rCloud  = (isDead && frozen) ? frozen.cloudOff : cloudOffset;
  const rWorld  = (isDead && frozen) ? WORLDS[frozen.worldIdx] : w;

  // PLAYING / DYING
  drawBg(rWorld);
  drawClouds(rWorld, rCloud);
  drawSun(rWorld);
  drawGround(rWorld, rSand);
  drawObstacles(rObs, rCacti, rWorld);

  for(const pt of S.parts){
    ctx.globalAlpha=pt.life/38;
    ctx.fillStyle=pt.color; ctx.fillRect(pt.x-2,pt.y-2,4,4);
  }
  ctx.globalAlpha=1;

  if(S.player){
    const p=S.player;
    const key=p.dead?'panic':(!p.onGround?'run':(p.anim%2===0?'walk1':'walk2'));
    drawSpr(key, p.x, p.y, ANNIE_H);
  }

  drawPopups();
  drawHUD(rWorld);

  // WORLD CLEAR
  if(S.screen==='worldclear'){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#F5C518'; ctx.font='bold 24px '+FONT;
    ctx.fillText('WORLD '+WORLDS[0].name+' CLEAR!', W/2, H/2-18);
    ctx.fillStyle='#FFD700'; ctx.font='bold 20px '+FONT;
    ctx.fillText('+1000', W/2, H/2+20);
    ctx.fillStyle='#FFF'; ctx.font='11px '+FONT;
    ctx.fillText('SPACE / TAP  >>  ENTER THE MINES', W/2, H/2+56);
    ctx.textAlign='left';
  }

  // GAME OVER — just sky + ground (from frozen world) + tombstone + text
  // No clouds, no sun, no Annie, no obstacles
  if(S.screen==='dead'){
    const dw=WORLDS[frozen?frozen.worldIdx:S.worldIdx];
    // Re-draw clean sky and ground, no other elements
    drawBg(dw);
    drawGround(dw, frozen?frozen.sandOff:sandOffset);

    // Tombstone centered on ground
    const gW=Math.round(W*0.20), gH=Math.round(gW*SRC.grave[2]/SRC.grave[1]);
    if(IMG.grave&&IMG.grave.complete)
      ctx.drawImage(IMG.grave, W/2-gW/2, GROUND-gH, gW, gH);

    // GAME OVER text: two lines, centered in sky
    const goFS=Math.round(H*0.082);
    const midSky=Math.round(GROUND*0.42);
    ctx.textAlign='center';
    ctx.fillStyle='#FFFFFF'; ctx.font=goFS+'px '+FONT;
    ctx.fillText('GAME', W/2, midSky);
    ctx.fillText('OVER', W/2, midSky+goFS+8);
    ctx.textAlign='left';
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

</script></body>
